<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job</title>
    <link rel="stylesheet" href="notifications.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans','Segoe UI',sans-serif; background: #eef0f4; min-height: 100vh; }
        nav {
            background: #0984e3; padding: 0 32px;
            display: flex; align-items: center; justify-content: space-between; height: 56px;
        }
        nav .brand { color: white; font-weight: 700; font-size: 1.1rem; }
        nav .nav-links { display: flex; gap: 6px; }
        nav a {
            color: rgba(255,255,255,0.85); text-decoration: none;
            padding: 6px 13px; border-radius: 6px; font-size: 0.86rem; font-weight: 500;
            transition: background 0.2s;
        }
        nav a:hover { background: rgba(255,255,255,0.2); color: white; }
        .page { display: flex; justify-content: center; padding: 40px 16px; }
        .apply-container {
            background: white; padding: 36px 32px; border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.09); width: 100%; max-width: 540px;
        }
        h2 { color: #0984e3; font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; }
        .job-details {
            background: #f7f8fa; padding: 14px 16px; border-radius: 8px;
            margin-bottom: 24px; border-left: 4px solid #00b894;
            font-size: 0.95rem; color: #333;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.93rem; color: #222; }
        textarea {
            width: 100%; padding: 11px 13px; border: 1.5px solid #dde1e7;
            border-radius: 7px; resize: vertical; font-family: inherit;
            font-size: 0.92rem; color: #333; outline: none; transition: border-color 0.2s;
        }
        textarea:focus { border-color: #0984e3; }
        .upload-area {
            width: 100%; border: 2px dashed #c5cad4; border-radius: 8px;
            padding: 22px 16px; text-align: center; cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #fafbfc; position: relative;
        }
        .upload-area:hover { border-color: #00b894; background: #f0faf7; }
        .upload-area.has-file { border-color: #00b894; background: #f0faf7; }
        .upload-area input[type="file"] {
            position: absolute; inset: 0; opacity: 0;
            cursor: pointer; width: 100%; height: 100%;
        }
        .upload-icon { font-size: 1.1rem; margin-bottom: 6px; font-weight: 700; color: #0984e3; }
        .upload-label { font-size: 0.9rem; color: #555; }
        .upload-label span { color: #0984e3; font-weight: 600; }
        .upload-hint { font-size: 0.78rem; color: #999; margin-top: 4px; }
        #file-name-display {
            margin-top: 10px; font-size: 0.85rem;
            color: #00b894; font-weight: 500; display: none;
        }
        .saved-resume-notice {
            background: #e8f8f5; border: 1.5px solid #00b894; border-radius: 8px;
            padding: 12px 14px; margin-bottom: 10px; font-size: 0.88rem; color: #00704f;
            display: none;
        }
        .saved-resume-notice a { color: #0984e3; font-weight: 600; }
        .submit-btn {
            background: #00b894; color: white; border: none;
            padding: 13px 20px; border-radius: 7px; cursor: pointer;
            width: 100%; font-weight: 700; font-size: 1rem; font-family: inherit;
            transition: background 0.2s, transform 0.1s;
        }
        .submit-btn:hover { background: #00a381; }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { background: #aaa; cursor: not-allowed; }
        .notification {
            position: fixed; top: 22px; right: 22px; min-width: 280px; max-width: 360px;
            padding: 14px 16px; border-radius: 10px; color: #fff; font-size: 0.92rem;
            font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.18); opacity: 0;
            transform: translateY(-10px); pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease; z-index: 9999;
        }
        .notification.show { opacity: 1; transform: translateY(0); }
        .notification.success { background: #00b894; }
        .notification.error { background: #d63031; }
        .notification.info { background: #0984e3; }
    </style>
</head>
<body>
    <div id="notification" class="notification" role="status" aria-live="polite"></div>
    <nav>
        <span class="brand">Smart Job Portal</span>
        <div class="nav-links">
            <a href="index.html">Jobs</a>
            <a href="my_applications.html">My Applications</a>
            <a href="resume.html">My Resume</a>
            <a href="employer.html">Dashboard</a>
            <a href="employer_my_applications.html">All Applications</a>
        </div>
    </nav>
    <div class="page">
        <div class="apply-container">
            <h2>Job Application</h2>
            <div id="job-info" class="job-details">Loading job details...</div>
            <div class="form-group">
                <label for="cover-letter">Why are you a good fit?</label>
                <textarea id="cover-letter" rows="5" placeholder="Describe your experience..."></textarea>
            </div>
            <div class="form-group">
                <label>Attach Resume</label>
                <div id="saved-resume-notice" class="saved-resume-notice">
                    Saved resume will be used: <span id="saved-resume-name"></span>.
                    You can upload a different one below or <a href="resume.html">manage your resume</a>.
                </div>
                <div class="upload-area" id="upload-area">
                    <input type="file" id="resume-file" accept=".pdf,.doc,.docx" />
                    <div class="upload-icon">UPLOAD</div>
                    <div class="upload-label"><span>Click to upload</span> or drag & drop</div>
                    <div class="upload-hint">PDF, DOC, DOCX - max 5MB</div>
                </div>
                <div id="file-name-display">Selected: <span id="file-name-text"></span></div>
            </div>
            <button class="submit-btn" id="submit-btn" onclick="submitApplication()">Confirm Application</button>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');
        const jobTitle = urlParams.get('title') || 'Selected Position';
        let notificationTimer;

        document.getElementById('job-info').innerHTML = `<strong>Applying for:</strong> ${jobTitle}`;

        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            clearTimeout(notificationTimer);
            notificationTimer = setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        async function checkSavedResume() {
            try {
                const res = await fetch('get_resume.php?user_id=1');
                const data = await res.json();
                if (data.success && data.resume_path) {
                    const notice = document.getElementById('saved-resume-notice');
                    document.getElementById('saved-resume-name').textContent = data.original_name || 'resume on file';
                    notice.style.display = 'block';
                }
            } catch (e) {}
        }

        document.getElementById('resume-file').addEventListener('change', function () {
            const file = this.files[0];
            const display = document.getElementById('file-name-display');
            const nameText = document.getElementById('file-name-text');
            const uploadArea = document.getElementById('upload-area');
            if (file) {
                nameText.textContent = file.name;
                display.style.display = 'block';
                uploadArea.classList.add('has-file');
            } else {
                display.style.display = 'none';
                uploadArea.classList.remove('has-file');
            }
        });

        async function submitApplication() {
            const coverLetter = document.getElementById('cover-letter').value.trim();
            const resumeFile = document.getElementById('resume-file').files[0];
            const btn = document.getElementById('submit-btn');

            if (!jobId) {
                showNotification('Job information is missing. Please reopen the job and try again.', 'error');
                return;
            }
            if (!coverLetter) {
                showNotification('Please describe why you are a good fit.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Submitting...';
            try {
                const formData = new FormData();
                formData.append('job_id', jobId);
                formData.append('user_id', 1);
                formData.append('cover_letter', coverLetter);
                if (resumeFile) formData.append('resume', resumeFile);

                const response = await fetch('apply.php', { method: 'POST', body: formData });
                if (!response.ok) throw new Error('Server error');

                const result = await response.json();
                showNotification(result.message, result.success ? 'success' : 'error');
                if (result.success) {
                    setTimeout(() => {
                        window.location.href = 'my_applications.html';
                    }, 1200);
                }
            } catch (error) {
                console.error('Submission Error:', error);
                showNotification('Failed to submit. Ensure apply.php is running.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Confirm Application';
            }
        }

        checkSavedResume();
    </script>
    <script>
        window.NOTIFICATION_CONTEXT = { role: 'job_seeker', recipientId: 1 };
    </script>
    <script src="notifications.js"></script>
</body>
</html>
