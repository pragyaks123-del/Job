<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Listings | Smart Job Portal</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #20b2aa;
        --primary-dark: #178f88;
        --primary-light: #e0f7f6;
        --bg-base: #f7f9fc;
        --bg-surface: #ffffff;
        --text-pri: #0f172a;
        --text-sec: #334155;
        --text-muted: #64748b;
        --border: #e4e9f2;
        --success: #10b981;
        --danger: #ef4444;
        --radius: 12px;
        --radius-lg: 20px;
        --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        --font: "Poppins", sans-serif;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-base);
        color: var(--text-pri);
      }

      .navbar {
        background: white;
        border-bottom: 1px solid var(--border);
        padding: 0 32px;
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .navbar-inner {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
      }

      .logo {
        font-size: 1.5rem;
        font-weight: bold;
        text-decoration: none;
        color: var(--text-pri);
      }

      .logo span {
        color: var(--primary);
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 32px;
      }

      .page-hero {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--primary-dark) 100%
        );
        color: white;
        padding: 40px 0;
        margin-bottom: 30px;
      }

      .filters-bar {
        background: white;
        border-bottom: 1px solid var(--border);
        padding: 20px 0;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .filters-inner {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      .filters-inner input,
      .filters-inner select {
        padding: 10px 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background: var(--primary-dark);
      }

      .btn-outline {
        background: white;
        border: 1px solid var(--border);
      }

      .page-layout {
        display: flex;
        gap: 30px;
        margin: 30px 0;
      }

      .sidebar {
        width: 280px;
        flex-shrink: 0;
      }

      .sidebar-card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        border: 1px solid var(--border);
      }

      .jobs-area {
        flex: 1;
      }

      .results-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .jobs-list {
        display: grid;
        gap: 20px;
      }

      .job-card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        border: 1px solid var(--border);
        transition: all 0.2s;
      }

      .job-card:hover {
        box-shadow: var(--shadow);
        transform: translateY(-2px);
      }

      .job-card h3 {
        margin-bottom: 10px;
        color: var(--primary);
      }

      .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }

      .badge-success {
        background: #d1fae5;
        color: #065f46;
      }

      .empty-state {
        text-align: center;
        padding: 60px;
        color: var(--text-muted);
      }

      .loader {
        text-align: center;
        padding: 40px;
      }

      .hidden {
        display: none !important;
      }

      .toast-global {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #1e293b;
        color: white;
        padding: 12px 24px;
        border-radius: 40px;
        z-index: 1000;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @media (max-width: 768px) {
        .page-layout {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
        }
        .filters-inner {
          flex-direction: column;
        }
        .filters-inner input,
        .filters-inner select,
        .filters-inner button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-inner">
        <a href="#" class="logo"
          ><i class="fas fa-briefcase"></i> Job<span>Portal</span></a
        >
        <div id="nav-links"></div>
        <div id="nav-actions"></div>
      </div>
    </nav>

    <section class="page-hero">
      <div class="container">
        <h1><i class="fas fa-list"></i> Job Listings</h1>
        <p>Find your next opportunity</p>
      </div>
    </section>

    <div class="filters-bar">
      <div class="container">
        <div class="filters-inner">
          <input
            type="text"
            id="search-keyword"
            placeholder="🔍 Keyword"
            style="flex: 2"
          />
          <input
            type="text"
            id="search-location"
            placeholder="📍 Location"
            style="flex: 2"
          />
          <select id="filter-category" style="flex: 1">
            <option value="">All Categories</option>
            <option>Technology</option>
            <option>Marketing</option>
            <option>Finance</option>
            <option>Design</option>
          </select>
          <select id="filter-type" style="flex: 1">
            <option value="">All Types</option>
            <option value="full-time">Full Time</option>
            <option value="part-time">Part Time</option>
            <option value="contract">Contract</option>
          </select>
          <button class="btn btn-primary" onclick="filterJobs()">
            <i class="fas fa-search"></i> Search
          </button>
          <button class="btn btn-outline" onclick="clearAllFilters()">
            <i class="fas fa-eraser"></i> Clear
          </button>
        </div>
      </div>
    </div>

    <main>
      <div class="container">
        <div class="page-layout">
          <aside class="sidebar">
            <div class="sidebar-card">
              <h3><i class="fas fa-filter"></i> Quick Filters</h3>
              <hr style="margin: 15px 0" />
              <div id="salary-filter">
                <label>Min Salary</label>
                <input
                  type="number"
                  id="min-salary"
                  placeholder="Min $"
                  oninput="filterJobs()"
                  style="
                    width: 100%;
                    padding: 8px;
                    margin: 8px 0;
                    border: 1px solid var(--border);
                    border-radius: 6px;
                  "
                />
                <label>Max Salary</label>
                <input
                  type="number"
                  id="max-salary"
                  placeholder="Max $"
                  oninput="filterJobs()"
                  style="
                    width: 100%;
                    padding: 8px;
                    margin: 8px 0;
                    border: 1px solid var(--border);
                    border-radius: 6px;
                  "
                />
              </div>
            </div>
          </aside>

          <div class="jobs-area">
            <div class="results-header">
              <div id="results-count">Loading jobs...</div>
              <select id="sort-select" onchange="sortAndRender()">
                <option value="newest">Newest First</option>
                <option value="salary_high">Salary (High to Low)</option>
                <option value="salary_low">Salary (Low to High)</option>
              </select>
            </div>
            <div id="jobs-container" class="jobs-list">
              <div class="loader">Loading jobs from backend...</div>
            </div>
            <div class="pagination" id="pagination"></div>
          </div>
        </div>
      </div>
    </main>

    <script>
      // ============================================================
      // COMPLETE JOB LISTINGS WITH BACKEND INTEGRATION
      // ============================================================

      let allJobs = [];
      let filteredJobs = [];
      let debounceTimer;

      // API Configuration - FIXED PATH
      const API_BASE_URL =
        "http://localhost:8080/job-portal-system/helper/api/";

      // Helper functions
      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      function formatSalary(min, max) {
        if (!min && !max) return "Salary not specified";
        if (min && max)
          return `$${min.toLocaleString()} - $${max.toLocaleString()}`;
        if (min) return `$${min.toLocaleString()}+`;
        return `Up to $${max.toLocaleString()}`;
      }

      function formatDate(dateString) {
        if (!dateString) return "Recently";
        const date = new Date(dateString);
        const now = new Date();
        const diffTime = Math.abs(now - date);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays === 0) return "Today";
        if (diffDays === 1) return "Yesterday";
        if (diffDays < 7) return `${diffDays} days ago`;
        if (diffDays < 30) return `${Math.floor(diffDays / 7)} weeks ago`;
        return date.toLocaleDateString();
      }

      function statusBadge(status) {
        if (status === "open")
          return '<span class="badge badge-success">● Open</span>';
        return '<span class="badge">● Closed</span>';
      }

      function showToast(message, type = "success") {
        const toast = document.createElement("div");
        toast.className = "toast-global";
        toast.innerHTML = `<i class="fas ${type === "success" ? "fa-check-circle" : "fa-exclamation-circle"}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      // Load jobs from backend
      async function loadJobs() {
        try {
          console.log(
            "📡 Fetching jobs from:",
            `${API_BASE_URL}jobs.php?action=list`,
          );

          const response = await fetch(`${API_BASE_URL}jobs.php?action=list`, {
            method: "GET",
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }

          const data = await response.json();
          console.log("📦 Backend response:", data);

          if (data.error) {
            throw new Error(data.error);
          }

          allJobs = data.jobs || [];
          filteredJobs = [...allJobs];

          console.log(`✅ Loaded ${allJobs.length} jobs from backend`);

          if (allJobs.length === 0) {
            // Fallback to demo data if no jobs in database
            loadDemoJobs();
          } else {
            renderJobs();
          }

          document.getElementById("results-count").innerHTML =
            `<strong>${filteredJobs.length}</strong> jobs found`;
        } catch (error) {
          console.error("❌ Error loading jobs:", error);
          showToast(
            "Failed to load jobs from backend. Using demo data.",
            "error",
          );
          loadDemoJobs();
        }
      }

      // Demo jobs for testing
      function loadDemoJobs() {
        console.log("📦 Loading demo jobs...");
        allJobs = [
          {
            id: 1,
            title: "Senior Frontend Developer",
            description: "Looking for an experienced React developer",
            category: "Technology",
            job_type: "full-time",
            location: "Remote",
            salary_min: 80000,
            salary_max: 120000,
            skills: "React, TypeScript, CSS",
            status: "open",
            created_at: new Date().toISOString(),
            employer_name: "Tech Corp",
          },
          {
            id: 2,
            title: "Marketing Manager",
            description: "Lead our marketing team",
            category: "Marketing",
            job_type: "full-time",
            location: "New York, NY",
            salary_min: 70000,
            salary_max: 95000,
            skills: "SEO, Analytics, Social Media",
            status: "open",
            created_at: new Date(Date.now() - 86400000).toISOString(),
            employer_name: "Marketing Pro",
          },
          {
            id: 3,
            title: "Financial Analyst",
            description: "Analyze financial data",
            category: "Finance",
            job_type: "full-time",
            location: "Chicago, IL",
            salary_min: 65000,
            salary_max: 85000,
            skills: "Excel, Financial Modeling",
            status: "open",
            created_at: new Date(Date.now() - 172800000).toISOString(),
            employer_name: "Finance Hub",
          },
          {
            id: 4,
            title: "UI/UX Designer",
            description: "Design beautiful interfaces",
            category: "Design",
            job_type: "contract",
            location: "Remote",
            salary_min: 60000,
            salary_max: 90000,
            skills: "Figma, Adobe XD",
            status: "open",
            created_at: new Date(Date.now() - 259200000).toISOString(),
            employer_name: "Design Studio",
          },
        ];
        filteredJobs = [...allJobs];
        renderJobs();
        showToast("Demo jobs loaded successfully", "success");
      }

      // Render jobs to DOM
      function renderJobs() {
        const container = document.getElementById("jobs-container");

        if (!filteredJobs.length) {
          container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open" style="font-size: 48px; margin-bottom: 16px;"></i>
                        <h3>No jobs found</h3>
                        <p>Try adjusting your filters or check back later</p>
                    </div>
                `;
          document.getElementById("results-count").innerHTML =
            `<strong>0</strong> jobs found`;
          return;
        }

        container.innerHTML = filteredJobs
          .map(
            (job) => `
                <div class="job-card">
                    <h3>${escapeHtml(job.title)}</h3>
                    <p style="color: var(--text-muted); margin: 8px 0;">
                        <i class="fas fa-building"></i> ${escapeHtml(job.employer_name || "Company")} &nbsp;|&nbsp;
                        <i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || "Remote")}
                    </p>
                    <p style="margin: 12px 0;">
                        <i class="fas fa-tag"></i> ${escapeHtml(job.category || "General")} &nbsp;|&nbsp;
                        <i class="fas fa-clock"></i> ${escapeHtml(job.job_type || "Full-time")}
                    </p>
                    <p style="font-size: 1.2rem; font-weight: bold; color: var(--primary); margin: 12px 0;">
                        ${formatSalary(job.salary_min, job.salary_max)}
                    </p>
                    <p style="margin: 12px 0;">${escapeHtml(job.description?.substring(0, 150))}${job.description?.length > 150 ? "..." : ""}</p>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px;">
                        <div>${statusBadge(job.status)}</div>
                        <small style="color: var(--text-muted);">
                            <i class="fas fa-calendar"></i> ${formatDate(job.created_at)}
                        </small>
                    </div>
                    <button class="btn btn-primary" style="margin-top: 16px; width: 100%;" onclick="viewJobDetails(${job.id})">
                        <i class="fas fa-eye"></i> View Details
                    </button>
                </div>
            `,
          )
          .join("");

        document.getElementById("results-count").innerHTML =
          `<strong>${filteredJobs.length}</strong> job${filteredJobs.length !== 1 ? "s" : ""} found`;
      }

      // Filter jobs
      window.filterJobs = function () {
        const keyword = document
          .getElementById("search-keyword")
          .value.toLowerCase();
        const location = document
          .getElementById("search-location")
          .value.toLowerCase();
        const category = document.getElementById("filter-category").value;
        const type = document.getElementById("filter-type").value;
        const minSalary =
          parseInt(document.getElementById("min-salary")?.value) || 0;
        const maxSalary =
          parseInt(document.getElementById("max-salary")?.value) || Infinity;

        filteredJobs = allJobs.filter((job) => {
          const matchesKeyword =
            !keyword ||
            job.title.toLowerCase().includes(keyword) ||
            (job.description &&
              job.description.toLowerCase().includes(keyword));
          const matchesLocation =
            !location ||
            (job.location && job.location.toLowerCase().includes(location));
          const matchesCategory = !category || job.category === category;
          const matchesType = !type || job.job_type === type;
          const matchesSalary =
            (job.salary_min || 0) >= minSalary &&
            (job.salary_max || Infinity) <= maxSalary;

          return (
            matchesKeyword &&
            matchesLocation &&
            matchesCategory &&
            matchesType &&
            matchesSalary
          );
        });

        sortAndRender();
      };

      window.debounceSearch = function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          filterJobs();
        }, 300);
      };

      window.clearAllFilters = function () {
        document.getElementById("search-keyword").value = "";
        document.getElementById("search-location").value = "";
        document.getElementById("filter-category").value = "";
        document.getElementById("filter-type").value = "";
        if (document.getElementById("min-salary"))
          document.getElementById("min-salary").value = "";
        if (document.getElementById("max-salary"))
          document.getElementById("max-salary").value = "";

        filteredJobs = [...allJobs];
        sortAndRender();
        showToast("All filters cleared", "success");
      };

      window.sortAndRender = function () {
        const sortBy = document.getElementById("sort-select").value;

        if (sortBy === "salary_high") {
          filteredJobs.sort(
            (a, b) => (b.salary_max || 0) - (a.salary_max || 0),
          );
        } else if (sortBy === "salary_low") {
          filteredJobs.sort(
            (a, b) => (a.salary_min || 0) - (b.salary_min || 0),
          );
        } else {
          filteredJobs.sort(
            (a, b) => new Date(b.created_at) - new Date(a.created_at),
          );
        }

        renderJobs();
      };

      window.viewJobDetails = function (jobId) {
        const job = allJobs.find((j) => j.id === jobId);
        if (job) {
          alert(
            `Job Details:\n\nTitle: ${job.title}\nDescription: ${job.description}\nLocation: ${job.location || "Remote"}\nSalary: ${formatSalary(job.salary_min, job.salary_max)}`,
          );
        }
      };

      // Check authentication and setup navbar
      function setupNavbar() {
        const userStr = localStorage.getItem("jobportal_user");
        const navLinks = document.getElementById("nav-links");
        const navActions = document.getElementById("nav-actions");

        if (userStr) {
          const user = JSON.parse(userStr);
          navLinks.innerHTML = `
                    <a href="post-job.html" style="margin-right: 20px; text-decoration: none;">Jobs</a>
                    ${user.role === "employer" ? '<a href="employer-dashboard.html" style="margin-right: 20px; text-decoration: none;">Dashboard</a>' : '<a href="seeker-dashboard.html" style="margin-right: 20px; text-decoration: none;">My Applications</a>'}
                `;
          navActions.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 16px;">
                        <span><i class="fas fa-user"></i> ${escapeHtml(user.name)}</span>
                        <button onclick="logout()" style="background: none; border: none; cursor: pointer; color: var(--danger);">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </div>
                `;
        } else {
          navLinks.innerHTML = `<a href="login.html" style="text-decoration: none;">Login</a>`;
          navActions.innerHTML = `<a href="login.html" class="btn btn-primary" style="text-decoration: none;">Post a Job</a>`;
        }
      }

      window.logout = function () {
        localStorage.removeItem("jobportal_user");
        showToast("Logged out successfully", "success");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1000);
      };

      // Initialize
      setupNavbar();
      loadJobs();
    </script>
  </body>
</html>
